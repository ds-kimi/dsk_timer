<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="handShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1.6" dy="2.2" stdDeviation="1.6" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <g id="tick">
      <line x1="0" y1="-86" x2="0" y2="-73"/>
    </g>
  </defs>
  <circle cx="100" cy="100" r="96" fill="#F1F5F9" stroke="#1B4571" stroke-width="3"/>
  <g transform="translate(100 100)" stroke="#0D4A73" stroke-linecap="butt" stroke-width="3.4">
    <use href="#tick"/>
    <use href="#tick" transform="rotate(30)"/>
    <use href="#tick" transform="rotate(60)"/>
    <use href="#tick" transform="rotate(90)"/>
    <use href="#tick" transform="rotate(120)"/>
    <use href="#tick" transform="rotate(150)"/>
    <use href="#tick" transform="rotate(180)"/>
    <use href="#tick" transform="rotate(210)"/>
    <use href="#tick" transform="rotate(240)"/>
    <use href="#tick" transform="rotate(270)"/>
    <use href="#tick" transform="rotate(300)"/>
    <use href="#tick" transform="rotate(330)"/>
  </g>
  <g transform="translate(100 100)" stroke="#0D4A73" stroke-linecap="butt">
    <g filter="url(#handShadow)" stroke-width="6.8">
      <line x1="0" y1="0" x2="0" y2="-55" transform="rotate(300)"/>
      <line x1="0" y1="0" x2="0" y2="-72" transform="rotate(60)"/>
    </g>
    <line x1="0" y1="0" x2="0" y2="-55" stroke-width="6.8" transform="rotate(300)"/>
    <line x1="0" y1="0" x2="0" y2="-72" stroke-width="6.8" transform="rotate(60)"/>
    <line x1="0" y1="10" x2="0" y2="-86" stroke-width="2.8"/>
  </g>
</svg>
